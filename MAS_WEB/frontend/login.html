<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAS MEDICAL HUB - تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="login-body">
    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" title="تغيير المظهر">
        <i class="fa-solid fa-moon" id="theme-icon"></i>
    </button>

    <div class="login-container">
        <!-- Glowing Orbs (CSS in style.css) -->
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>

        <div class="login-glass-card">
            <div class="logo-container">
                <div class="rotating-logo">
                    <img src="../assets/image/MAS.png" alt="MAS Logo">
                </div>
            </div>

            <h1 class="login-title">MAS <span>MEDICAL HUB</span></h1>
            <p class="login-subtitle">مركز التحكم وإدارة البيانات الطبية الموحدة</p>

            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" id="email" placeholder="اسم المستخدم أو البريد الإلكتروني" required>
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="كلمة المرور" required>
                </div>

                <button type="submit" class="btn btn-primary login-btn">
                    دخول إلى النظام <i class="fa-solid fa-arrow-left"></i>
                </button>
            </form>

            <div class="login-footer">
                <a href="#" class="forgot-password">نسيت كلمة المرور؟</a>
                <p>هذه البوابة مخصصة لمسؤولي المركز الطبي فقط.</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Set initial theme based on localStorage
        if (localStorage.getItem('mas_theme') === 'light') {
            document.body.classList.add('light-mode');
            const themeIcon = document.getElementById('theme-icon');
            if (themeIcon) themeIcon.classList.replace('fa-moon', 'fa-sun');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.querySelector('.login-btn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> جاري التحقق...';
            btn.disabled = true;

            try {
                const response = await fetch('http://localhost:8000/api/medical/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Save Token & User Info
                    localStorage.setItem('mas_token', data.token);
                    localStorage.setItem('mas_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    alert('خطأ في الدخول: ' + (data.error || 'يرجى التأكد من البيانات'));
                    btn.innerHTML = 'دخول إلى النظام <i class="fa-solid fa-arrow-left"></i>';
                    btn.disabled = false;
                }
            } catch (err) {
                alert('فشل الاتصال بالسيرفر. تأكد من تشغيل الباك اند محلياً.');
                btn.innerHTML = 'دخول إلى النظام <i class="fa-solid fa-arrow-left"></i>';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
